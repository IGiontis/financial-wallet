<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MyFiWallet — Personal Finance App</title>
    <meta name="title" content="MyFiWallet — Personal Finance App" />
    <meta
      name="description"
      content="MyFiWallet is a free personal finance app for Greek users. Track income and expenses in EUR, USD or GBP, set savings goals, and get a clear overview of your finances."
    />
    <meta
      name="keywords"
      content="personal finance app Greece, budget tracker Greece, expense tracker EUR, free finance app Greek, savings goals app, financial wallet Greece, money manager Greece, διαχείριση οικονομικών"
    />
    <meta name="author" content="MyFiWallet" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myfiwallet.netlify.app/" />
    <meta property="og:title" content="MyFiWallet — Personal Finance App" />
    <meta property="og:description" content="Track your income, expenses and savings goals in EUR, USD or GBP. Free personal finance app designed for Greek users." />
    <meta property="og:image" content="https://myfiwallet.netlify.app/favicon.svg" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="MyFiWallet" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://myfiwallet.netlify.app/" />
    <meta name="twitter:title" content="MyFiWallet — Personal Finance App" />
    <meta name="twitter:description" content="Track your income, expenses and savings goals in EUR, USD or GBP. Free personal finance app designed for Greek users." />
    <meta name="twitter:image" content="https://myfiwallet.netlify.app/favicon.svg" />
    <meta name="google-site-verification" content="I05mXwSEbPspbs8qW9ZG66RwSOLHJYrBPw1AZpalF84" />
    <!-- Canonical -->
    <link rel="canonical" href="https://myfiwallet.netlify.app/" />

    <!-- Structured Data — WebApplication schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "MyFiWallet",
        "url": "https://myfiwallet.netlify.app",
        "description": "Free personal finance app for Greek users. Track income, expenses and savings goals in EUR, USD or GBP.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "inLanguage": "en",
        "audience": {
          "@type": "Audience",
          "geographicArea": {
            "@type": "Country",
            "name": "Greece"
          }
        },
        "featureList": ["Income and expense tracking", "Savings goals", "Multi-currency support (EUR, USD, GBP)", "Financial overview dashboard", "Investment goal tracking"]
      }
    </script>

    <!-- Google Fonts (optional — remove if not used) -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
